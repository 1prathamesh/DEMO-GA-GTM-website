<!DOCTYPE html>
<html>
<head>
  <title>ShopZone</title>

  <!-- GTM -->
  <script>
  (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id=GTM-MGVPFTRP'+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-MGVPFTRP');
  </script>

  <script>
    window.dataLayer = window.dataLayer || [];
  </script>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial; }
body { background:#f5f5f5; }

/* NAV */
.nav {
  background:#111;
  color:#fff;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
}
.nav button {
  background:#ff6b00;
  border:none;
  padding:8px;
  color:white;
  margin-left:10px;
  cursor:pointer;
}

/* HERO */
.hero {
  background: linear-gradient(135deg,#000,#444);
  color:white;
  text-align:center;
  padding:50px;
}

/* GRID */
.container { padding:30px; }
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}
.card {
  background:white;
  padding:15px;
  border-radius:10px;
}
.card img { width:100%; height:150px; object-fit:cover; border-radius:8px; }

.price { color:#ff6b00; font-weight:bold; }

.card button {
  margin-top:10px;
  padding:8px;
  border:none;
  background:#111;
  color:white;
  cursor:pointer;
}

/* CART */
.page { display:none; }
.active { display:block; }

.cart-item {
  background:white;
  padding:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}
</style>

</head>

<body>

<!-- GTM NOSCRIPT -->
<noscript>
<iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MGVPFTRP"
height="0" width="0" style="display:none"></iframe>
</noscript>

<div class="nav">
  <h2>🛒 ShopZone</h2>
  <div>
    <button onclick="showPage('products')">Products</button>
    <button onclick="openCart()">Cart (<span id="cart-count">0</span>)</button>
  </div>
</div>

<div class="hero">
  <h1>Upgrade Your Style 🔥</h1>
</div>

<div id="products" class="container page active">
  <div class="grid" id="product-list"></div>
</div>

<div id="cart" class="container page">
  <h2>Cart</h2>
  <div id="cart-items"></div>
  <h3 id="total"></h3>
  <button onclick="checkout()">Checkout</button>
</div>

<div id="checkout" class="container page">
  <h2>Checkout</h2>
  <button onclick="purchase()">Place Order</button>
</div>

<script>

let cart = [];
let liked = [];

// PAGE SWITCH
function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById(p).classList.add('active');
}

// LOAD PRODUCTS
fetch('/products')
.then(res=>res.json())
.then(data=>{
  const div = document.getElementById("product-list");

  data.forEach(p=>{
    const card = document.createElement("div");
    card.className="card";

    card.innerHTML = `
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p class="price">₹${p.price}</p>
      <button onclick='addToCart(${JSON.stringify(p)})'>Add</button>
      <button onclick='like(${p.id})'>❤️</button>
    `;

    div.appendChild(card);

    dataLayer.push({event:"view_item", ecommerce:{items:[p]}});
  });
});

// ADD TO CART
function addToCart(p){
  cart.push(p);
  document.getElementById("cart-count").innerText = cart.length;

  dataLayer.push({
    event:"add_to_cart",
    ecommerce:{value:p.price,items:[p]}
  });
}

// LIKE
function like(id){
  if(!liked.includes(id)){
    liked.push(id);
    alert("Liked ❤️");
  }
}

// OPEN CART
function openCart(){
  showPage('cart');

  let total=0;
  const div = document.getElementById("cart-items");
  div.innerHTML="";

  cart.forEach(p=>{
    total += p.price;
    const el = document.createElement("div");
    el.className="cart-item";
    el.innerHTML = `<span>${p.name}</span><span>₹${p.price}</span>`;
    div.appendChild(el);
  });

  document.getElementById("total").innerText = "Total: ₹" + total;

  dataLayer.push({event:"view_cart", ecommerce:{items:cart}});
}

// CHECKOUT
function checkout(){
  showPage('checkout');
  dataLayer.push({event:"begin_checkout", ecommerce:{items:cart}});
}

// PURCHASE
function purchase(){
  fetch('/purchase',{method:"POST"})
  .then(res=>res.json())
  .then(res=>{
    dataLayer.push(res.dataLayer);
    alert("Order placed!");
  });
}

</script>

</body>
</html>
