<!DOCTYPE html>
<html>
<head>
  <title>Pro Ecommerce Store</title>

<script>
window.dataLayer = window.dataLayer || [];
</script>

<!-- PUT YOUR GTM ID -->
<script>
(function(w,d,s,l,i){
w[l]=w[l]||[];
w[l].push({'gtm.start': new Date().getTime(),event:'gtm.js'});
var f=d.getElementsByTagName(s)[0],
j=d.createElement(s);
j.async=true;
j.src='https://www.googletagmanager.com/gtm.js?id='+i;
f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-XXXXXXX');
</script>

<style>
body { font-family: Arial; padding: 20px; }
button { margin: 5px; padding: 8px; }
.page { display: none; }
.active { display: block; }
</style>

</head>

<body>

<h2>🛒 My Store</h2>

<!-- NAV -->
<button onclick="showPage('products')">Products</button>
<button onclick="showPage('cart')">Cart</button>

<!-- PRODUCTS PAGE -->
<div id="products" class="page active"></div>

<!-- CART PAGE -->
<div id="cart" class="page"></div>

<!-- CHECKOUT PAGE -->
<div id="checkout" class="page">
  <h3>Checkout</h3>
  <input placeholder="Name"><br><br>
  <button onclick="placeOrder()">Place Order</button>
</div>

<!-- CONFIRMATION -->
<div id="confirmation" class="page">
  <h3>✅ Order Placed!</h3>
</div>

<script>

let cart = [];

// PAGE SWITCH
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

// LOAD PRODUCTS
fetch('/products')
.then(res=>res.json())
.then(data=>{
  const div = document.getElementById('products');

  data.forEach(p=>{
    const el = document.createElement("div");

    el.innerHTML = `
      <p>${p.name} - ₹${p.price}</p>
      <button onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>
    `;

    div.appendChild(el);

    // view_item
    dataLayer.push({
      event: "view_item",
      ecommerce: { items: [p] }
    });
  });
});

// ADD TO CART
function addToCart(p){
  cart.push(p);

  dataLayer.push({
    event: "add_to_cart",
    ecommerce: {
      value: p.price,
      items: [p]
    }
  });

  alert("Added to cart");
}

// CART PAGE
function renderCart(){
  const div = document.getElementById('cart');
  div.innerHTML = "<h3>Cart</h3>";

  cart.forEach(p=>{
    const el = document.createElement("p");
    el.innerText = p.name;
    div.appendChild(el);
  });

  const btn = document.createElement("button");
  btn.innerText = "Checkout";
  btn.onclick = goCheckout;
  div.appendChild(btn);

  dataLayer.push({
    event: "view_cart",
    ecommerce: { items: cart }
  });
}

// CHECKOUT
function goCheckout(){
  showPage('checkout');

  dataLayer.push({
    event: "begin_checkout",
    ecommerce: { items: cart }
  });
}

// PURCHASE
function placeOrder(){
  fetch('/purchase',{method:"POST"})
  .then(res=>res.json())
  .then(res=>{
    dataLayer.push(res.dataLayer);
    showPage('confirmation');
  });
}

// CART PAGE LOAD
document.querySelector("button:nth-child(3)").onclick = () => {
  renderCart();
  showPage('cart');
};

</script>

</body>
</html>
